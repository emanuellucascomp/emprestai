spring.application.name=emprestai

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/emprestai_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=emprestai_user
spring.datasource.password=emprestai_password
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.drop-first=false
spring.liquibase.default-schema=public

# Logging
logging.level.root=WARN
logging.level.org.springframework.liquibase=INFO
logging.level.liquibase=INFO