version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: emprestai_postgres
    environment:
      POSTGRES_DB: emprestai_db
      POSTGRES_USER: emprestai_user
      POSTGRES_PASSWORD: emprestai_password
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - emprestai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emprestai_user -d emprestai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["postgres", "-c", "log_statement=all", "-c", "log_duration=on"]

volumes:
  emprestai_postgres_data:
    driver: local